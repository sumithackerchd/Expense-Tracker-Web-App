{% extends "base.html" %}

{% block content %}

<h1 class="mb-4">💰 Expense Records</h1>

<div class="card shadow">

    <div class="card-body">

        <form method="GET" action="/expenses" class="mb-4">

            <div class="row">

                <div class="col-md-10">

                    <input
                        type="text"
                        name="search"
                        class="form-control"
                        placeholder="Search by title or category">

                </div>

                <div class="col-md-2">

                    <button class="btn btn-primary w-100">
                        Search
                    </button>

                </div>

            </div>

        </form>

        <div class="mb-3">

            <a href="/add" class="btn btn-success">
                ➕ Add Expense
            </a>

            <a href="/" class="btn btn-secondary">
                🏠 Home
            </a>

        </div>

        <table class="table table-bordered table-striped">

            <thead class="table-dark">

                <tr>

                    <th>ID</th>
                    <th>Title</th>
                    <th>Amount</th>
                    <th>Category</th>
                    <th>Date</th>
                    <th>Action</th>

                </tr>

            </thead>

            <tbody>

                {% for expense in expenses %}

                <tr>

                    <td>{{ expense[0] }}</td>
                    <td>{{ expense[1] }}</td>
                    <td>₹{{ expense[2] }}</td>
                    <td>{{ expense[3] }}</td>
                    <td>{{ expense[4] }}</td>

                    <td>

                        <a href="/update/{{ expense[0] }}"
                           class="btn btn-warning btn-sm">
                            Edit
                        </a>

                        <a href="/delete/{{ expense[0] }}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete Expense?')">
                            Delete
                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
