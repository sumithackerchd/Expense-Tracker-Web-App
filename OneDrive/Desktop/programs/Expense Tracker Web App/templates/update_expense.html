{% extends "base.html" %}

{% block content %}

<div class="card shadow">

    <div class="card-body">

        <h2 class="mb-4">✏️ Update Expense</h2>

        <form method="POST">

            <input type="text"
                   name="title"
                   class="form-control mb-3"
                   value="{{ expense[1] }}"
                   required>

            <input type="number"
                   step="0.01"
                   name="amount"
                   class="form-control mb-3"
                   value="{{ expense[2] }}"
                   required>

            <input type="text"
                   name="category"
                   class="form-control mb-3"
                   value="{{ expense[3] }}"
                   required>

            <input type="date"
                   name="date"
                   class="form-control mb-3"
                   value="{{ expense[4] }}"
                   required>

            <button class="btn btn-warning">
                Update Expense
            </button>

            <a href="/expenses"
               class="btn btn-secondary">
               Back
            </a>

        </form>

    </div>

</div>

{% endblock %}
