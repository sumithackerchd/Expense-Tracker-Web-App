{% extends "base.html" %}

{% block content %}

<div class="card shadow">

    <div class="card-body">

        <h2 class="mb-4">➕ Add Expense</h2>

        <form method="POST">

            <input type="text"
                   name="title"
                   class="form-control mb-3"
                   placeholder="Expense Title"
                   required>

            <input type="number"
                   step="0.01"
                   name="amount"
                   class="form-control mb-3"
                   placeholder="Amount"
                   required>

            <input type="text"
                   name="category"
                   class="form-control mb-3"
                   placeholder="Category (Food, Travel, Shopping)"
                   required>

            <input type="date"
                   name="date"
                   class="form-control mb-3"
                   required>

            <button class="btn btn-success">
                Save Expense
            </button>

        </form>

    </div>

</div>

{% endblock %}
