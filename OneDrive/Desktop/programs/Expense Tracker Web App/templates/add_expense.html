{% extends "base.html" %}

{% block content %}

<div class="card shadow">

    <div class="card-body">

        <h2 class="mb-4">➕ Add New Expense</h2>

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Expense Title
                </label>

                <input
                    type="text"
                    name="title"
                    class="form-control"
                    placeholder="Enter Expense Title"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Amount (₹)
                </label>

                <input
                    type="number"
                    step="0.01"
                    name="amount"
                    class="form-control"
                    placeholder="Enter Amount"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Category
                </label>

                <select
                    name="category"
                    class="form-select"
                    required>

                    <option value="">
                        Select Category
                    </option>

                    <option>Food</option>
                    <option>Travel</option>
                    <option>Shopping</option>
                    <option>Bills</option>
                    <option>Entertainment</option>
                    <option>Medical</option>
                    <option>Education</option>
                    <option>Other</option>

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Expense Date
                </label>

                <input
                    type="date"
                    name="date"
                    class="form-control"
                    required>

            </div>

            <button
                type="submit"
                class="btn btn-success">

                💾 Save Expense

            </button>

            <a
                href="/expenses"
                class="btn btn-secondary">

                🔙 Back

            </a>

        </form>

    </div>

</div>

{% endblock %}
