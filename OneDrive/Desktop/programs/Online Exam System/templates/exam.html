<!DOCTYPE html>
<html>

<head>

<title>Online Exam</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h1 class="mb-4">
📝 Online Exam
</h1>

<form method="POST" action="/result">

{% for q in questions %}

<div class="card shadow mb-4">

<div class="card-body">

<h5 class="mb-3">

{{ loop.index }}.
{{ q[1] }}

</h5>

<div class="form-check">

<input class="form-check-input"
type="radio"
name="q{{ q[0] }}"
value="{{ q[2] }}">

<label class="form-check-label">
{{ q[2] }}
</label>

</div>

<div class="form-check">

<input class="form-check-input"
type="radio"
name="q{{ q[0] }}"
value="{{ q[3] }}">

<label class="form-check-label">
{{ q[3] }}
</label>

</div>

<div class="form-check">

<input class="form-check-input"
type="radio"
name="q{{ q[0] }}"
value="{{ q[4] }}">

<label class="form-check-label">
{{ q[4] }}
</label>

</div>

<div class="form-check">

<input class="form-check-input"
type="radio"
name="q{{ q[0] }}"
value="{{ q[5] }}">

<label class="form-check-label">
{{ q[5] }}
</label>

</div>

</div>

</div>

{% endfor %}

<button class="btn btn-success btn-lg">
Submit Exam
</button>

</form>

</div>

</body>
</html>
